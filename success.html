<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auftrag erhalten – Inkasso Blum</title>
<meta name="description" content="Ihr Inkasso-Auftrag wurde erfolgreich übermittelt. Vielen Dank!" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
<style>
  :root {
    --blue-900: #0f2540;
    --blue-700: #1f4775;
    --blue-100: #dbe6f2;
    --ink: #0f2540;
    --muted: #5b6b82;
    --bg: #ffffff;
    --bg-soft: #fafaf7;
    --card: #ffffff;
    --line: #e5e9f0;
    --shadow-lg: 0 12px 40px rgba(15, 37, 64, 0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg-soft);
    color: var(--ink);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  .success-card {
    max-width: 560px; width: 100%;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    box-shadow: var(--shadow-lg);
    padding: 3rem 2.5rem;
    text-align: center;
  }
  .success-icon {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: var(--blue-100);
    color: var(--blue-700);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 1.5rem;
  }
  .success-icon svg { width: 36px; height: 36px; }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400; font-size: 2rem;
    color: var(--blue-900); margin-bottom: 0.75rem;
  }
  p { color: var(--muted); font-size: 1rem; line-height: 1.6; margin-bottom: 1.5rem; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.5rem;
    background: var(--blue-900); color: #fff;
    padding: 0.85rem 1.5rem; border-radius: 999px;
    text-decoration: none; font-weight: 600; font-size: 0.95rem;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .btn:hover { background: var(--blue-700); transform: translateY(-1px); }
  .btn svg { width: 18px; height: 18px; }
</style>
</head>
<body>
  <main class="success-card">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12" />
      </svg>
    </div>
    <h1>Vielen Dank!</h1>
    <p>Ihr Auftrag wurde erfolgreich übermittelt. Sie erhalten in Kürze eine Bestätigung mit Ihrer Geschäftszahl an die angegebene E-Mail-Adresse. Unser Team kontaktiert Sie bei Bedarf.</p>
    <a href="/" class="btn">
      Zurück zur Startseite
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </a>
  </main>
</body>
</html>
